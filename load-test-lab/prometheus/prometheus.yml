global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9464']

  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8002']

  - job_name: 'backend-nginx'
    static_configs:
      - targets: ['backend-nginx:80']
    metrics_path: /nginx_status
