global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9464']
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8002']
  - job_name: 'backend-nginx'
    static_configs:
      - targets: ['backend-nginx:80']
    metrics_path: /nginx_status
  - job_name: 'chaos-agent'
    static_configs:
      - targets: ['chaos-agent:8081']
  - job_name: 'workers'
    static_configs:
      - targets: ['worker1:5000', 'worker2:5000']


  - job_name: 'chaos-agent'
    static_configs:
      - targets: ['chaos-agent:8080']

  - job_name: 'workers'
    static_configs:
      - targets: ['worker1:5000', 'worker2:5000']